<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Long Polling</title>
  </head>
  <body>
    <h1>Long Polling</h1>
    <div id="root"></div>
  </body>
  <script>
    let timerId;
    let data;
    async function longPolling(data) {
      
      try {
          const res = await fetch('/long-poll/getData?lastData='+data)
          if(res.ok){
            const result = await res.json()
            data = result.data;
            document.getElementById('root').innerHTML = data;
            longPolling(data)
        }else{
            console.log(res.status);
        } 
      }catch (error) {
        console.error('Long polling error:', error);
        // Wait for a few seconds before retrying
        await new Promise(resolve => setTimeout(resolve, 5000));
        // Retry the long polling
        longPolling(data);
      }
    }
    longPolling(data)
  </script>
</html>
